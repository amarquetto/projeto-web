<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestão</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      color: #4e73df;
      margin-bottom: 15px;
    }

    p {
      margin-bottom: 25px;
      color: #555;
      font-size: 1.1rem;
    }

    nav a {
      text-decoration: none;
      color: #fff;
      background-color: #4e73df;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 6px;
      display: inline-block;
      transition: 0.3s;
      font-weight: bold;
    }

    nav a:hover {
      background-color: #2e59d9;
      transform: scale(1.05);
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Sistema de Gestão</h1>
    <p>Bem-vindo ao sistema desenvolvido com Flask.</p>

    <nav>
        <a href="/">Início</a>
        <a href="/sobre">Sobre</a>
        <a href="/cor/red">Página Vermelha</a>
        <a href="/bootstrap">Bootstrap</a>
    </nav>
  </div>

</body>
</html>
